server:
  port: 8080

spring:
  application:
    name: tracking-poc

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.poc.tracking: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

tracking:
  polling:
    interval-ms: 1000
  event:
    buffer-size: 256
  emulator:
    total-events: 100
    event-interval-ms: 200
